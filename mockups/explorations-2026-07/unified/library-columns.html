var rail="en", mode="book", curBook=0, curLvl=0, sortMode="lesson";
var scope={part:null, lesson:null};          // null,null = whole selection
var CNP=["一","二","三"];
var LEVELS=[
  {code:"A1",books:[0]},{code:"A2",books:[1]},{code:"B1",books:[2,3,4]},
  {code:"B2",books:[]},{code:"C1",books:[]},{code:"C2",books:[]}
];
function lnum(l){return parseInt(l.slice(l.indexOf("L")+1),10);}
function bookOf(code){return parseInt(code[1],10)-1;}
function bParts(n){return n===10?[4,7,10]:[n/3,2*n/3,n];}
function partRange(p,i){return [i===0?1:p[i-1]+1, p[i]];}
function lessonsOf(b){
  var map={}, order=[];
  b.R.forEach(function(r){ var c=r[0]; if(!map[c]){map[c]=[];order.push(c);} map[c].push(r); });
  return order.map(function(c){ return {code:c, num:lnum(c), R:map[c]}; });
}
function partCols(b){ // a single volume → its three 部分
  var parts=bParts(b.n), ls=lessonsOf(b), cols=[];
  for(var i=0;i<3;i++){(function(i){
    var rg=partRange(parts,i);
    cols.push({pn:"第"+CNP[i]+"部分", rg:"L"+rg[0]+"–"+rg[1],
      items:ls.filter(function(x){return x.num>=rg[0]&&x.num<=rg[1];}),
      reads:b.R.filter(function(r){var n=lnum(r[0]);return n>=rg[0]&&n<=rg[1];})});
  })(i);}
  return cols;
}
function currentCols(){
  if(mode==="book") return partCols(BOOKS[curBook]);
  var lvl=LEVELS[curLvl];
  if(!lvl.books.length) return [{pn:lvl.code,rg:"",items:[],reads:[]}];
  if(lvl.books.length===1) return partCols(BOOKS[lvl.books[0]]);
  return lvl.books.slice(0,3).map(function(bi){ var b=BOOKS[bi];
    return {pn:b.vol, rg:b.n+" 課", items:lessonsOf(b), reads:b.R.slice()}; });
}
function multiBook(){return mode==="level"&&LEVELS[curLvl].books.length>1;}

function renderShelf(){
  var el=document.getElementById("shelf"), html="";
  if(mode==="book"){
    BOOKS.forEach(function(b,i){
      html+='<button class="cover'+(i===curBook?" on":"")+(b.R.length?"":" dim")+'" data-i="'+i+'">'+
        '<span class="v">'+b.vol+'</span><span class="lv">'+b.band+'</span></button>';});
  } else {
    LEVELS.forEach(function(L,i){
      var live=L.books.some(function(bi){return BOOKS[bi].R.length;});
      html+='<button class="cover lvl'+(i===curLvl?" on":"")+(live?"":" dim")+'" data-i="'+i+'">'+
        '<span class="v">'+L.code+'</span></button>';});
  }
  el.innerHTML=html;
  el.querySelectorAll(".cover").forEach(function(c){c.addEventListener("click",function(){
    var i=+c.dataset.i; if(mode==="book")curBook=i; else curLvl=i;
    scope={part:null,lesson:null}; renderShelf(); renderBand(); renderList();});});
}
function renderBand(){
  var cols=currentCols(), html="";
  cols.forEach(function(col,i){
    var hOn=scope.part===i&&scope.lesson===null;
    html+='<div class="col">';
    html+='<button class="colh'+(hOn?" on":"")+'" data-part="'+i+'"><span class="pn">'+col.pn+'</span><span class="rg">'+col.rg+'</span></button>';
    if(!col.items.length){ html+='<div class="soon">尚未出版<span>coming soon</span></div>'; }
    else col.items.forEach(function(L){
      var on=scope.lesson===L.code;
      var rep=rail==="en"?L.R[0][2]:L.R[0][3];
      html+='<button class="les'+(on?" on":"")+'" data-l="'+L.code+'" data-part="'+i+'">'+
        '<span class="lnum">課'+L.num+'</span><span class="ltitle">'+rep+'</span></button>';
    });
    html+='</div>';
  });
  var el=document.getElementById("cols"); el.innerHTML=html;
  el.querySelectorAll(".les").forEach(function(bn){bn.addEventListener("click",function(){
    var l=bn.dataset.l, p=+bn.dataset.part;
    if(scope.lesson===l){ scope.lesson=null; scope.part=p; }      // re-click: widen to its column
    else { scope.lesson=l; scope.part=p; }
    renderBand(); renderList();});});
  el.querySelectorAll(".colh").forEach(function(bn){bn.addEventListener("click",function(){
    var p=+bn.dataset.part;
    if(scope.part===p&&scope.lesson===null){ scope.part=null; }   // re-click: widen to everything
    else { scope.part=p; scope.lesson=null; }
    renderBand(); renderList();});});
  sizeShelf(cols);
}
function scopedReadings(){
  var cols=currentCols();
  if(scope.lesson){ var all=[]; cols.forEach(function(c){all=all.concat(c.reads);});
    return all.filter(function(r){return r[0]===scope.lesson;}); }
  if(scope.part!==null&&cols[scope.part]) return cols[scope.part].reads.slice();
  var all=[]; cols.forEach(function(c){all=all.concat(c.reads);}); return all;
}
function lessonLabel(code){
  var n=lnum(code);
  return multiBook() ? BOOKS[bookOf(code)].vol.charAt(1)+"·課"+n : "課"+n;
}
function renderList(){
  var data=scopedReadings(), hadAny=data.length>0;
  if(q){ var ql=q.toLowerCase();
    data=data.filter(function(r){return r[2].toLowerCase().indexOf(ql)>=0||r[3].toLowerCase().indexOf(ql)>=0||r[4].indexOf(q)>=0;}); }
  var tb=document.getElementById("rows");
  if(!data.length){ tb.innerHTML='<tr><td class="empty">'+(q&&hadAny?"No matches.":"Not yet published.")+'</td></tr>'; return; }
  if(sortMode==="format") data.sort(function(x,y){return FLAB[fcls(x[1])].localeCompare(FLAB[fcls(y[1])])||x[0].localeCompare(y[0]);});
  else if(sortMode==="title") data.sort(function(x,y){var a=rail==="en"?x[2]:x[3],c=rail==="en"?y[2]:y[3];return a.localeCompare(c);});
  else data.sort(function(x,y){return x[0].localeCompare(y[0]);});
  var prev=null;
  tb.innerHTML=data.map(function(r){
    var lead=rail==="en"?r[2]:r[3];
    // ledger convention: suppress a repeated 課 value (lesson sort only)
    var showL=sortMode!=="lesson"||r[0]!==prev; prev=r[0];
    return '<tr><td class="c-title"><i class="d '+fcls(r[1])+'" title="'+FTIP[fcls(r[1])]+'"></i><span class="lead">'+lead+'</span></td>'+
      '<td class="c-zh" lang="zh-Hant">'+r[4]+'</td>'+
      '<td class="c-lesson">'+(showL?lessonLabel(r[0]):"")+'</td></tr>';
  }).join("");
  tb.querySelectorAll("tr").forEach(function(tr){tr.addEventListener("click",function(){location.href="reader.html";});});
}
function sizeShelf(cols){
  var maxL=0; cols.forEach(function(c){if(c.items.length>maxL)maxL=c.items.length;});
  document.getElementById("band").style.setProperty("--shelfH", Math.max(120, 27+Math.min(maxL,5)*35)+"px");
}
document.querySelectorAll(".sect .tab").forEach(function(t){t.addEventListener("click",function(){
  var m=t.dataset.shelf; if(m===mode)return;
  mode=m; scope={part:null,lesson:null};
  document.querySelectorAll(".sect .tab").forEach(function(x){x.classList.toggle("on",x===t);});
  renderShelf(); renderBand(); renderList();});});
document.querySelectorAll(".sortbar .sb").forEach(function(bn){bn.addEventListener("click",function(){
  sortMode=bn.dataset.s; document.querySelectorAll(".sortbar .sb").forEach(function(x){x.classList.toggle("on",x===bn);}); renderList();});});
document.querySelectorAll(".rail button").forEach(function(bn){bn.addEventListener("click",function(){
  rail=bn.dataset.rail; document.querySelectorAll(".rail button").forEach(function(x){x.setAttribute("aria-pressed",String(x===bn));}); renderBand(); renderList();});});

/* the filter: typing narrows the table in place; composes with the band's scope */
var q="", fin=document.getElementById("fin");
fin.addEventListener("input",function(){ q=fin.value.trim(); renderList(); });
document.addEventListener("keydown",function(e){
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){e.preventDefault();fin.focus();}
  else if(e.key==="Escape"&&document.activeElement===fin){fin.value="";q="";renderList();fin.blur();}
});

(function(){var r=document.documentElement,b=document.getElementById("themeBtn");if(!r.getAttribute("data-theme"))r.setAttribute("data-theme","light");
  function s(){b.textContent=r.getAttribute("data-theme")==="dark"?"☀":"☾";}s();
  b.addEventListener("click",function(){var n=r.getAttribute("data-theme")==="dark"?"light":"dark";r.setAttribute("data-theme",n);try{localStorage.setItem("tsu-theme",n);}catch(e){}s();});})();
renderShelf(); renderBand(); renderList();
</script>
